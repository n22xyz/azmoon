<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه هوشمند دریافت کارنامه آنلاین</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #e6f4ea 100%);
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            padding: 30px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 35px;
        }
        h2 { text-align: center; color: #15803d; margin-bottom: 25px; font-size: 1.5rem; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #1e293b; font-size: 0.9rem; }
        select, input, button {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        select:focus, input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }
        button {
            background: linear-gradient(95deg, #16a34a, #15803d);
            border: none;
            color: white;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(22,163,74,0.2);
        }
        button:hover { transform: scale(1.01); background: linear-gradient(95deg, #15803d, #166534); }
        iframe {
            width: 100%;
            height: 750px;
            border: 2px solid #e2e8f0;
            margin-top: 30px;
            display: none;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .footer { text-align: center; margin-top: 25px; font-size: 0.8rem; color: #64748b; border-top: 1px dashed #e2e8f0; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 سامانه هوشمند کارنامه‌های آنلاین</h2>
    
    <label>🗓️ انتخاب تاریخ آزمون</label>
    <select id="dateSelect" onchange="onDateChange()"><option value="">ابتدا تاریخ را انتخاب کنید</option></select>

    <label>🏛️ انتخاب موسسه</label>
    <select id="instSelect" onchange="onInstChange()" disabled><option value="">ابتدا موسسه را انتخاب کنید</option></select>

    <label>🎓 انتخاب سطح / کد گروه</label>
    <select id="levelSelect" onchange="onLevelChange()" disabled><option value="">ابتدا سطح را انتخاب کنید</option></select>

    <label>🧪 انتخاب عنوان آزمون</label>
    <select id="examSelect" onchange="onExamChange()" disabled><option value="">ابتدا آزمون را انتخاب کنید</option></select>

    <label>👤 نام و نام خانوادگی دانش‌آموز</label>
    <select id="studentSelect" disabled><option value="">ابتدا دانش‌آموز را انتخاب کنید</option></select>

    <label>🔐 رمز عبور شخصی</label>
    <input type="password" id="studentPassword" placeholder="رمز عبور ثبت شده در پاسخبرگ">

    <button onclick="fetchAndUnlockReport()">🔍 مشاهده و دریافت کارنامه</button>

    <div class="footer">✨ طراحی شده توسط نیما پیام - کلیه حقوق محفوظ است ✨</div>
</div>

<iframe id="reportFrame"></iframe>

<script>
    const OUTER_PASSWORD = "OuterSecret@2024";
    
    // 🎯 فیکس ابدی: آدرس نسبی هوشمند؛ فایل دیتابیس و پوشه‌ها درست در کنار همین سایت قرار دارند
    const CLOUD_BASE_URL = "./"; 
    let dbData = {};

    async function loadReportsList() {
        try {
            // خواندن خودکار فایل لیست از کنار خودِ سایت در گیت‌هاب
            const response = await fetch(CLOUD_BASE_URL + 'reports_list.json');
            if (!response.ok) throw new Error("فایل دیتابیس کارنامه‌ها (reports_list.json) یافت نشد. مطمئن شوید آن را در کنار index.html آپلود کرده‌اید.");
            dbData = await response.json();
            
            const dateSelect = document.getElementById('dateSelect');
            Object.keys(dbData).forEach(date => {
                let option = document.createElement('option');
                option.value = date;
                option.textContent = date.replace(/_/g, '/');
                dateSelect.appendChild(option);
            });
        } catch (error) {
            alert("خطا در بارگذاری اولیه: " + error.message);
        }
    }

    function onDateChange() {
        const date = document.getElementById('dateSelect').value;
        const instSelect = document.getElementById('instSelect');
        resetSelects(['instSelect', 'levelSelect', 'examSelect', 'studentSelect']);
        if (!date) return;
        instSelect.disabled = false;
        Object.keys(dbData[date]).forEach(inst => {
            let option = document.createElement('option');
            option.value = inst; option.textContent = inst;
            instSelect.appendChild(option);
        });
    }

    function onInstChange() {
        const date = document.getElementById('dateSelect').value;
        const inst = document.getElementById('instSelect').value;
        const levelSelect = document.getElementById('levelSelect');
        resetSelects(['levelSelect', 'examSelect', 'studentSelect']);
        if (!inst) return;
        levelSelect.disabled = false;
        Object.keys(dbData[date][inst]).forEach(lvl => {
            let option = document.createElement('option');
            option.value = lvl; option.textContent = lvl;
            levelSelect.appendChild(option);
        });
    }

    function onLevelChange() {
        const date = document.getElementById('dateSelect').value;
        const inst = document.getElementById('instSelect').value;
        const lvl = document.getElementById('levelSelect').value;
        const examSelect = document.getElementById('examSelect');
        resetSelects(['examSelect', 'studentSelect']);
        if (!lvl) return;
        examSelect.disabled = false;
        Object.keys(dbData[date][inst][lvl]).forEach(exam => {
            let option = document.createElement('option');
            option.value = exam; option.textContent = exam;
            examSelect.appendChild(option);
        });
    }

    function onExamChange() {
        const date = document.getElementById('dateSelect').value;
        const inst = document.getElementById('instSelect').value;
        const lvl = document.getElementById('levelSelect').value;
        const exam = document.getElementById('examSelect').value;
        const studentSelect = document.getElementById('studentSelect');
        resetSelects(['studentSelect']);
        if (!exam) return;
        studentSelect.disabled = false;
        dbData[date][inst][lvl][exam].forEach(stu => {
            let option = document.createElement('option');
            option.value = stu.file_name; // آدرس‌دهی عمیق پایتون جدید برای این فایل زیپ
            option.textContent = stu.name;
            studentSelect.appendChild(option);
        });
    }

    function resetSelects(ids) {
        ids.forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = `<option value="">انتخاب کنید...</option>`;
            select.disabled = true;
        });
    }

    async function fetchAndUnlockReport() {
        const fileRelativePath = document.getElementById('studentSelect').value;
        const password = document.getElementById('studentPassword').value.trim();
        const reportFrame = document.getElementById('reportFrame');

        if (!fileRelativePath || !password) {
            alert("لطفاً تمامی گزینه‌ها و رمز عبور را وارد کنید.");
            return;
        }

        // ساخت آدرس مستقیم بر اساس ساختار پایتون جدید و روت نسبی گیت‌هاب
        const fileUrl = `${CLOUD_BASE_URL}${fileRelativePath}`;

        try {
            const response = await fetch(fileUrl);
            if (!response.ok) throw new Error("فایل کارنامه پیدا نشد. ممکن است آپلود پوشه تاریخ در گیت‌هاب ناقص باشد.");
            const arrayBuffer = await response.arrayBuffer();

            // باز کردن لایه اول (Outer) با پسورد ثابت سیستم
            const zip = await JSZip.loadAsync(arrayBuffer);
            const innerZipFile = Object.keys(zip.files).find(f => f.endsWith('.zip'));
            const innerZipBuffer = await zip.files[innerZipFile].async("arraybuffer");

            // باز کردن لایه دوم (Inner) با پسورد اختصاصی دانش‌آموز
            const innerZip = await JSZip.loadAsync(innerZipBuffer);
            const htmlFile = innerZip.file("index.html");
            
            if (!htmlFile) throw new Error("محتوای درون کارنامه معتبر نیست.");
            const htmlContent = await htmlFile.async("string");

            // رندر بدون دردسر و کاملاً امن در آی‌فریم زیر صفحه
            reportFrame.style.display = "block";
            const doc = reportFrame.contentWindow.document;
            doc.open(); doc.write(htmlContent); doc.close();
            reportFrame.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            alert("خطا در رمزگشایی کارنامه! احتمالاً رمز عبور اشتباه است یا فایل هنوز کامل آپلود نشده است.");
        }
    }

    window.onload = loadReportsList;
</script>
</body>
</html>
